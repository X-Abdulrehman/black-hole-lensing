<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Black Hole Lensing</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0f; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 16px; }
    canvas { border: 1px solid #1e1e2e; }
    .controls { display: flex; gap: 10px; }
    button {
      background: none; border: 1px solid #39ff8f; color: #39ff8f;
      font-family: monospace; font-size: 13px; padding: 8px 20px; cursor: pointer;
    }
    button:hover { background: rgba(57,255,143,0.1); }
  </style>
</head>
<body>
<canvas id="canvas"></canvas>
<div class="controls">
  <button id="btn-run">▶ RUN</button>
  <button id="btn-reset">RESET</button>
</div>
<script src="script.js"></script>
</body>
</html>
